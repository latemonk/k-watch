name: Lint Code

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      code: ${{ steps.diff.outputs.code }}
    steps:
      - id: diff
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "code=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          FILES=$(gh api "repos/${{ github.repository }}/pulls/${{ github.event.number }}/files" \
            --paginate --jq '.[].filename')
          CODE=$(echo "$FILES" | grep -vcE '\.md$|^docs/|^src-tauri/|^CHANGELOG\.md$|^LICENSE$|\.github/workflows/(build-desktop|docker-publish)\.yml$' || echo 0)
          echo "code=$( [ "$CODE" -gt 0 ] && echo true || echo false )" >> "$GITHUB_OUTPUT"

  biome:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint:unicode
      # KCG fork: the full `npm run lint` (biome over src/server/api/tests/…)
      # carries ~18k inherited findings from the upstream snapshot + committed
      # esbuild runtime bundles under api/. Until that backlog is groomed, the
      # enforced gate is the safe-html guard (the same gate the fork uses in
      # development). Re-widen to `npm run lint` after a biome cleanup pass.
      - run: npm run lint:safe-html
      - run: npm run lint:boundaries
      # KCG fork: lint:api-contract expects every api/*.js to be a sebuf
      # gateway or listed exception — the fork commits built esbuild bundles
      # there for the self-hosted runtime (82 files), so the upstream rule
      # does not apply. lint:premium-fetch requires a non-empty
      # PREMIUM_RPC_PATHS set, which the fork removed together with the Pro
      # paywall (v49). Both gates are upstream-product-specific; dropped.
      - run: npm run lint:rate-limit-policies
      - run: npm run security:vite-env-secrets
      - name: Markdown lint
        run: npm run lint:md
      - name: Version sync check
        run: npm run version:check

  public-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24'
      - run: npm run lint:public-docs

  mintlify-slugs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24'
      - run: node scripts/enforce-mintlify-reserved-slugs.mjs
