<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>대한민국 AI 통합 관제 — 오프라인</title>
  <style>
    body { background: #0a0f0f; color: #e0e0e0; font-family: system-ui;
           display: flex; align-items: center; justify-content: center;
           min-height: 100vh; margin: 0; }
    .c { text-align: center; padding: 2rem; }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    p { color: #888; font-size: 0.9rem; }
    button { margin-top: 1rem; padding: 0.5rem 1.5rem; background: #0b2a33;
             color: #55e0ff; border: 1px solid #0e4a5e; border-radius: 4px;
             cursor: pointer; }
  </style>
</head>
<body>
  <div class="c">
    <h1>지금 오프라인이에요</h1>
    <p>실시간 관제 데이터를 보려면 인터넷 연결이 필요해요.</p>
    <button onclick="location.reload()">다시 시도</button>
  </div>
</body>
</html>
